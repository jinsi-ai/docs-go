<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 深蓝主色渐变 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 橙色高亮渐变 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#mainGradient)" filter="url(#shadow)"/>
  
  <!-- 文档/书本图标 - 左页 -->
  <path d="M60 60 L60 140 Q60 150 70 150 L95 150 L95 65 Q80 60 60 60" 
        fill="#ffffff" 
        opacity="0.95"/>
  
  <!-- 文档/书本图标 - 右页 -->
  <path d="M105 65 L105 150 L130 150 Q140 150 140 140 L140 60 Q120 60 105 65" 
        fill="#f8fafc" 
        opacity="0.95"/>
  
  <!-- 书脊 -->
  <rect x="95" y="65" width="10" height="85" fill="#e2e8f0"/>
  
  <!-- 左侧文档线条 -->
  <rect x="70" y="80" width="20" height="3" rx="1.5" fill="#64748b"/>
  <rect x="70" y="90" width="18" height="3" rx="1.5" fill="#64748b"/>
  <rect x="70" y="100" width="20" height="3" rx="1.5" fill="#64748b"/>
  <rect x="70" y="110" width="15" height="3" rx="1.5" fill="#64748b"/>
  
  <!-- 右侧文档线条 -->
  <rect x="112" y="80" width="20" height="3" rx="1.5" fill="#64748b"/>
  <rect x="112" y="90" width="18" height="3" rx="1.5" fill="#64748b"/>
  <rect x="112" y="100" width="20" height="3" rx="1.5" fill="#64748b"/>
  <rect x="112" y="110" width="15" height="3" rx="1.5" fill="#64748b"/>
  
  <!-- 思考/智慧符号 - 灯泡/光芒 -->
  <g transform="translate(100, 45)">
    <!-- 光芒线条 -->
    <line x1="0" y1="-15" x2="0" y2="-22" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="-10" x2="-17" y2="-15" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="-10" x2="17" y2="-15" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- 灯泡主体 -->
    <path d="M-8 -5 Q-8 -15 0 -15 Q8 -15 8 -5 Q8 0 5 3 L5 6 Q5 8 3 8 L-3 8 Q-5 8 -5 6 L-5 3 Q-8 0 -8 -5" 
          fill="url(#accentGradient)"/>
    
    <!-- 灯泡底座 -->
    <rect x="-3" y="8" width="6" height="2" rx="1" fill="#ea580c"/>
    <rect x="-2" y="11" width="4" height="2" rx="1" fill="#ea580c"/>
  </g>
  
  <!-- 装饰性圆点 - 代表"近思"的点 -->
  <circle cx="35" cy="100" r="4" fill="url(#accentGradient)" opacity="0.8"/>
  <circle cx="165" cy="100" r="4" fill="url(#accentGradient)" opacity="0.8"/>
</svg>
