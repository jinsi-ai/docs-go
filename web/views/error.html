<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.error}} - {{.siteTitle}}</title>
    <link href="/static/css/tailwind.min.css" rel="stylesheet">
    <style>
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        .sidebar {
            border-right: 1px solid #e5e7eb;
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            border-bottom: 1px solid #e5e7eb;
        }
        
        .nav-item {
            transition: all 0.2s ease;
        }
        
        .nav-item:hover {
            background-color: #f3f4f6;
        }
        
        .nav-item.active {
            background-color: #e0f2fe;
            color: #0369a1;
            font-weight: 500;
        }
        
        .nav-item.active > a {
            color: #0369a1;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">

        <!-- 主内容区 -->
        <main class="flex-1 overflow-y-auto p-4 lg:p-8 bg-gray-50">
            <div class="mobile-header lg:hidden p-4 fixed top-0 right-0 left-0 bg-white z-20 flex justify-between items-center shadow-sm">
                <h2 class="font-bold text-lg">{{.error}}</h2>
                <button id="menu-toggle" class="text-gray-500 hover:text-gray-700">
                    <!-- 内联SVG替代汉堡菜单图标 -->
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <div class="max-w-xl mx-auto mt-16 lg:mt-8">
                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="px-6 py-10 text-center">
                        <div class="flex justify-center mb-6">
                            <div class="rounded-full bg-red-100 p-3">
                                <!-- 内联SVG替代警告图标 -->
                            <svg class="w-12 h-12 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            </div>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">{{.error}}</h2>
                        <p class="text-gray-600 mb-8">{{.message}}</p>
                        <div class="flex justify-center space-x-4">
                            <a href="/" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                <!-- 内联SVG替代首页图标 -->
                                <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                                </svg>返回首页
                            </a>
                            <button onclick="window.history.back()" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                <!-- 内联SVG替代返回箭头图标 -->
                                <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="19" y1="12" x2="5" y2="12"></line>
                                    <polyline points="12 19 5 12 12 5"></polyline>
                                </svg>返回上一页
                            </button>
                        </div>
                    </div>
                </div>
                
            </div>
        </main>
    </div>
    


</body>
</html>
